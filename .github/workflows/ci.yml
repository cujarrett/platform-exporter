name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Lint
        run: go vet ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/cujarrett/platform-exporter:main
            ghcr.io/cujarrett/platform-exporter:sha-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Update image tag in homelab
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_PAT }}
        run: |
          FILE="cluster/platform-exporter/deployment.yaml"
          IMAGE="ghcr.io/cujarrett/platform-exporter"
          REPO="cujarrett/homelab"
          SHA_TAG="sha-${GITHUB_SHA}"

          FILE_SHA=$(gh api /repos/$REPO/contents/$FILE --jq '.sha')
          CONTENT=$(gh api /repos/$REPO/contents/$FILE --jq '.content' | tr -d '\n' | base64 -d)
          UPDATED=$(echo "$CONTENT" | sed "s|image: ${IMAGE}:.*|image: ${IMAGE}:${SHA_TAG}|")

          gh api --method PUT /repos/$REPO/contents/$FILE \
            -f message="chore: deploy platform-exporter ${SHA_TAG}" \
            -f content="$(echo "$UPDATED" | base64 -w 0)" \
            -f sha="$FILE_SHA"
